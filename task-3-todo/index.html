<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>My To-Do List</title>
	<style>
		header{
			background-color: blue;
			display: grid;
			place-items: center;
			margin: 0;
		}
		body{
    		margin:0;
		}
	</style>
</head>
<body>
	<header>
		<div>
			<h1>My To-Do List</h1> 
			<p>Stay Organized & Ge Things Done</p>
		</div>
	</header>

	<main>
			<form id="todo-form">
	  			<input 
	    			type="text" 
	    			id="todo-input" 
	    			placeholder="Add a new task..." 
	    			required 
	    			maxlength="100"
	    			autocomplete="off"
	  			>
	  			<button type="submit">Add Task</button>
			</form>

			<section class="filters">
				
			</section>

			<section class="task-list">
				
			</section>

			<section class="stats">
				
			</section>
	</main>

	<footer>
		<p>Ritesh Shinde</p>
	</footer>	
</body>	
</html>

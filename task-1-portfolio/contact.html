    <main>

        <section class="contact">
            <div class="container">

                <h2>Contact Me</h2>

                <p>
                    Have an opportunity or just want to connect?
                    Feel free to reach out.
                </p>

                <form>

                    <label for="name">Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required
                    >

                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                    >

                    <label for="message">Message</label>

                    <textarea
                        id="message"
                        name="message"
                        rows="6"
                        required
                    ></textarea>

                    <button class="btn" type="submit">
                        Send Message
                    </button>

                </form>

            </div>
        </section>

    </main>
